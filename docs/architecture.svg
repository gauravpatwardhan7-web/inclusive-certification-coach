<svg viewBox="0 0 1060 760" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748B"/>
    </marker>
    <style>
      .lbl{fill:#0F172A;font-weight:700}
      .sub{fill:#44546A;font-size:12px}
      .box{rx:12;stroke:#E2E8F0;stroke-width:1.5;fill:#FFFFFF}
      .agent{fill:#FFFFFF;stroke:#C7D8FE;stroke-width:1.5}
      .title{fill:#0F172A;font-weight:700;font-size:13px}
      .flow{stroke:#64748B;stroke-width:1.6;fill:none}
    </style>
  </defs>

  <rect x="0" y="0" width="1060" height="760" fill="#F7F9FC"/>
  <text x="40" y="44" font-size="22" class="lbl">Inclusive Certification Coach — Architecture</text>
  <text x="40" y="66" class="sub">Accessibility-first multi-agent reasoning on Microsoft Foundry · all data synthetic</text>

  <!-- USERS -->
  <rect x="40" y="92" width="980" height="62" rx="12" fill="#EFF4FF" stroke="#C7D8FE" stroke-width="1.5"/>
  <text x="56" y="116" class="title">People</text>
  <rect x="120" y="100" width="170" height="46" rx="10" fill="#FFFFFF" stroke="#C7D8FE"/>
  <text x="140" y="128" class="title">Learner</text>
  <rect x="305" y="100" width="190" height="46" rx="10" fill="#FFFFFF" stroke="#C7D8FE"/>
  <text x="325" y="128" class="title">People manager</text>
  <text x="540" y="124" class="sub">Streamlit app · 3 tabs: Learn · Manager view · How it works (live reasoning trace)</text>

  <line x1="530" y1="154" x2="530" y2="186" class="flow" marker-end="url(#arrow)"/>

  <!-- ORCHESTRATOR -->
  <rect x="330" y="188" width="400" height="92" rx="12" fill="#0F172A"/>
  <text x="350" y="216" fill="#FFFFFF" font-weight="700" font-size="15">Orchestrator — reasoning loop (o4-mini)</text>
  <text x="350" y="240" fill="#CBD5E1" font-size="12.5">Reasons over score · weak areas · attempt history · profile</text>
  <rect x="350" y="250" width="108" height="22" rx="6" fill="#065F46"/><text x="362" y="266" fill="#fff" font-size="11.5" font-weight="700">advance</text>
  <rect x="466" y="250" width="92" height="22" rx="6" fill="#92400E"/><text x="478" y="266" fill="#fff" font-size="11.5" font-weight="700">loop</text>
  <rect x="566" y="250" width="100" height="22" rx="6" fill="#991B1B"/><text x="578" y="266" fill="#fff" font-size="11.5" font-weight="700">escalate</text>
  <!-- loop arrow -->
  <path d="M330,234 C250,234 250,330 300,330" class="flow" marker-end="url(#arrow)"/>
  <text x="150" y="238" fill="#92400E" font-size="11.5" font-weight="700">re-curate weak areas ↺</text>
  <!-- guardrails -->
  <rect x="752" y="188" width="268" height="92" rx="12" fill="#FFFBEB" stroke="#FDE68A"/>
  <text x="768" y="212" class="title">Deterministic guardrails</text>
  <text x="768" y="234" class="sub">3+ stalled attempts → escalate</text>
  <text x="768" y="252" class="sub">valid-enum · focus_next invariants</text>
  <text x="768" y="270" class="sub">block ≠ meeting · team % in code</text>
  <line x1="752" y1="234" x2="730" y2="234" class="flow" marker-end="url(#arrow)"/>

  <line x1="530" y1="280" x2="530" y2="306" class="flow" marker-end="url(#arrow)"/>

  <!-- AGENTS GRID -->
  <text x="40" y="324" class="title">Cooperating agents (8) + accessibility narration layer</text>
  <g>
    <!-- row 1 -->
    <rect x="40"  y="336" width="232" height="66" rx="10" class="agent"/>
    <text x="54" y="360" class="title">Learning Path Curator</text>
    <text x="54" y="380" class="sub">cited skill-area path (Foundry IQ)</text>
    <rect x="284" y="336" width="232" height="66" rx="10" class="agent"/>
    <text x="298" y="360" class="title">Study Plan Generator</text>
    <text x="298" y="380" class="sub">accommodation-aware schedule</text>
    <rect x="528" y="336" width="232" height="66" rx="10" class="agent"/>
    <text x="542" y="360" class="title">Calendar Negotiator</text>
    <text x="542" y="380" class="sub">books real gaps · pushes back</text>
    <rect x="772" y="336" width="248" height="66" rx="10" class="agent"/>
    <text x="786" y="360" class="title">Assessment Agent</text>
    <text x="786" y="380" class="sub">cited questions · pick topics</text>
    <!-- row 2 -->
    <rect x="40"  y="414" width="232" height="66" rx="10" class="agent"/>
    <text x="54" y="438" class="title">Teach-back Assessor</text>
    <text x="54" y="458" class="sub">grades own-words understanding</text>
    <rect x="284" y="414" width="232" height="66" rx="10" class="agent"/>
    <text x="298" y="438" class="title">Manager Insights</text>
    <text x="298" y="458" class="sub">team rollup · consent-redacted</text>
    <rect x="528" y="414" width="232" height="66" rx="10" class="agent"/>
    <text x="542" y="438" class="title">Advocate</text>
    <text x="542" y="458" class="sub">manager note · profile redacted in code</text>
    <rect x="772" y="414" width="248" height="66" rx="10" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="786" y="438" class="title">Accessibility Narrator</text>
    <text x="786" y="458" class="sub">spoken script · client-side TTS</text>
  </g>

  <line x1="530" y1="480" x2="530" y2="512" class="flow" marker-end="url(#arrow)"/>
  <text x="544" y="502" class="sub">grounded retrieval · every claim cited</text>

  <!-- MICROSOFT FOUNDRY LAYER -->
  <rect x="40" y="514" width="980" height="150" rx="14" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="58" y="542" fill="#6D28D9" font-weight="700" font-size="16">Microsoft Foundry</text>
  <rect x="58" y="556" width="448" height="92" rx="10" fill="#FFFFFF" stroke="#DDD6FE"/>
  <text x="74" y="582" class="title">Azure OpenAI (Foundry models)</text>
  <text x="74" y="604" class="sub">o4-mini — orchestrator &amp; manager reasoning</text>
  <text x="74" y="624" class="sub">gpt-5-mini — workflow agents · structured JSON + retry</text>
  <rect x="528" y="556" width="464" height="92" rx="10" fill="#FFFFFF" stroke="#DDD6FE"/>
  <text x="544" y="582" class="title">Foundry IQ — Azure AI Search</text>
  <text x="544" y="604" class="sub">grounded retrieval index · returns source citations</text>
  <text x="544" y="624" class="sub">KB: AZ-204 / AZ-900 enablement guides (synthetic)</text>

  <!-- evidence footer -->
  <text x="40" y="700" class="sub">Evidence: 72/72 gold-set eval checks across 8 suites · orchestrator decisions verified 3× per case · refuses to hallucinate an unknown certification</text>
  <text x="40" y="722" class="sub">Responsible AI: 100% synthetic data · citations required · human-in-the-loop on advancement · consent enforced in code · users told they are interacting with AI</text>
</svg>
